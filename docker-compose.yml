services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediaserver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediaserver}
      POSTGRES_DB: ${POSTGRES_DB:-bokeh_mediaserver}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mediaserver}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The server itself — only used in production / integration testing.
  # During development, run `go run ./cmd/server` directly and only
  # start the postgres service: `docker compose up postgres`
  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-mediaserver}:${POSTGRES_PASSWORD:-mediaserver}@postgres:5432/${POSTGRES_DB:-bokeh_mediaserver}
      DATA_PATH: /data
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      WORKER_COUNT: ${WORKER_COUNT:-2}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
    volumes:
      # Media library (read-only — server never modifies source files)
      - ${MEDIA_PATH}:/media:ro
      # Derived data (thumbnails, tiles, HLS cache)
      - ${DATA_PATH:-./data}:/data
    ports:
      - "${PORT:-3000}:3000"
    profiles:
      # Only start with: docker compose --profile production up
      # During dev, just run the Go binary directly
      - production

volumes:
  postgres_data:
